services:
  db:
    image: mariadb
    container_name: prog-III-blog-BD
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
    volumes:
      - /home/smith/unoesc/prog-III/blog/db:/db
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prog-III-blog-app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  db_data:
